name: Build DCharVault

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.qml'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:



  # ============================================================================
  # JOB 3: ANDROID (ACTUALLY FINAL FIX)
  # ============================================================================
  build-android:
    name: 🤖 Android (ARM64)
    runs-on: ubuntu-latest
    
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential unzip wget

    # ✅ CREATE SDK ROOT PROPERLY
    - name: Prepare Android SDK Directory
      run: mkdir -p $ANDROID_SDK_ROOT

    # ✅ INSTALL CMDLINE TOOLS
    - name: Install Android Commandline Tools
      run: |
        cd $ANDROID_SDK_ROOT

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        unzip tools.zip
        rm tools.zip

        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true

        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

    # ✅ INSTALL SDK 33
    - name: Install Android SDK 33
      run: |
        yes | sdkmanager --licenses

        sdkmanager \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "platform-tools" \
          "ndk;27.3.13750724"


    # Install libsodium
    - name: Install Libsodium (VCPKG)
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install libsodium --triplet arm64-android --classic

        mkdir -p libs/arm64-v8a
        cp -r vcpkg/installed/arm64-android/include libs/arm64-v8a/
        mkdir -p libs/arm64-v8a/lib
        cp vcpkg/installed/arm64-android/lib/libsodium.a libs/arm64-v8a/lib/

        echo "SODIUM_ANDROID_ROOT_ENV=${{ github.workspace }}/libs" >> $GITHUB_ENV


    # Install Qt Host
    - name: Install Qt Host
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'
        cache: true

    # Install Qt Android
    - name: Install Qt Target
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true


    # Configure build
    - name: Configure CMake
      run: |
        export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.6.3/gcc_64

        qt-cmake -B build -DCMAKE_BUILD_TYPE=Release \
        -DQT_ANDROID_BUILD_ALL_ABIS=OFF \
        -DANDROID_ABI=arm64-v8a \
        -DANDROID_PLATFORM=android-28 \
        -DQT_ANDROID_COMPILE_SDK_VERSION=33 \
        -DQT_ANDROID_TARGET_SDK_VERSION=33 \
        -DQT_HOST_PATH=$QT_HOST_PATH


    # Build APK
    - name: Build APK
      run: cmake --build build --config Release


    # Upload artifact
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Android
        path: build/**/*.apk
        if-no-files-found: error
        retention-days: 1

