name: Build DCharVault

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.qml'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:

# ============================================================================
# LINUX
# ============================================================================
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - run: sudo apt-get update && sudo apt-get install -y build-essential libgl1-mesa-dev libsodium-dev pkg-config

    - uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        cache: true

    - run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - run: cmake --build build --config Release


# ============================================================================
# WINDOWS
# ============================================================================
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - run: |
        vcpkg install libsodium:x64-windows
        echo "SODIUM_ROOT_ENV=${{ github.workspace }}/vcpkg_installed/x64-windows" | Out-File $env:GITHUB_ENV -Append

    - uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'windows'
        arch: 'win64_msvc2019_64'
        cache: true

    - run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
    - run: cmake --build build --config Release


# ============================================================================
# ANDROID — REAL FIXED VERSION
# ============================================================================
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - run: sudo apt-get update && sudo apt-get install -y build-essential unzip

# 🔥 STEP 1 — FORCE SDK 33
    - name: Install Android SDK 33
      run: |
        yes | sdkmanager --licenses

        sdkmanager \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "platform-tools" \
          "ndk;25.2.9519653"

# 🔥 STEP 2 — DELETE BROKEN SDK 35
    - name: Remove broken SDK 35
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/platforms/android-35*
        sudo rm -rf /usr/local/lib/android/sdk/build-tools/35*

# Install libsodium
    - name: Install Libsodium
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install libsodium --triplet arm64-android --classic

        mkdir -p libs/arm64-v8a/lib
        cp -r vcpkg/installed/arm64-android/include libs/arm64-v8a/
        cp vcpkg/installed/arm64-android/lib/libsodium.a libs/arm64-v8a/lib/

        echo "SODIUM_ANDROID_ROOT_ENV=${{ github.workspace }}/libs" >> $GITHUB_ENV

# Qt
    - uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'

    - uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'

# Configure
    - name: Configure
      run: |
        export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.6.3/gcc_64

        qt-cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-33 \
          -DQT_ANDROID_COMPILE_SDK_VERSION=33 \
          -DQT_ANDROID_TARGET_SDK_VERSION=33 \
          -DQT_HOST_PATH=$QT_HOST_PATH

# Build
    - run: cmake --build build --config Release

# Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Android
        path: build/**/*.apk
