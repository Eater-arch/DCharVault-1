name: Build DCharVault

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.qml'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:
  # ============================================================================
  # JOB 1: LINUX (Ubuntu)
  # ============================================================================
  build-linux:
    name: 🐧 Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev libsodium-dev pkg-config

    - name: Install Qt 6.7 (Stable)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
        host: 'linux'
        modules: 'qt5compat qtshadertools qtquick3d'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

  # ============================================================================
  # JOB 2: WINDOWS (MSVC)
  # ============================================================================
  build-windows:
    name: 🪟 Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (VCPKG)
      run: |
        vcpkg install --triplet x64-windows
        echo "SODIUM_ROOT_ENV=${{ github.workspace }}/vcpkg_installed/x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Qt 6.7 (Stable)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
        host: 'windows'
        arch: 'win64_msvc2019_64' # 6.7 uses the 2019 kit (compatible with 2022)
        modules: 'qt5compat qtshadertools qtquick3d'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release

  # ============================================================================
  # JOB 3: ANDROID (APK Build)
  # ============================================================================
  build-android:
    name: 🤖 Android (ARM64)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential tar curl zip unzip

    # 1. Install Libsodium (Android) via VCPKG
    - name: Install Libsodium (VCPKG)
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install --triplet arm64-android
        mv vcpkg_installed/arm64-android vcpkg_installed/arm64-v8a
        echo "SODIUM_ANDROID_ROOT_ENV=${{ github.workspace }}/vcpkg_installed" >> $GITHUB_ENV

    # 2. INSTALL HOST QT (Linux Desktop Tools)
    - name: Install Qt Host (Linux)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        cache: true

    # 3. INSTALL TARGET QT (Android Libraries)
    - name: Install Qt Target (Android)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    # 4. Configure CMake
    - name: Configure CMake
      run: |
        # Point to the 6.7.2 Host Tools
        export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.7.2/gcc_64
        
        qt-cmake -B build -DCMAKE_BUILD_TYPE=Release \
        -DQT_ANDROID_BUILD_ALL_ABIS=ON \
        -DANDROID_ABI=arm64-v8a \
        -DQT_HOST_PATH=$QT_HOST_PATH

    # 5. Build the APK
    - name: Build APK
      run: cmake --build build --config Release
