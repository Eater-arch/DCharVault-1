name: Build DCharVault

on:
  workflow_dispatch: # Manual button
  push:
    branches: [ "main" ]
    paths: # Only run on code changes to save minutes
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.qml'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:
  # ============================================================================
  # JOB 1: LINUX (Ubuntu) - Qt 6.6.3 LTS
  # ============================================================================
  build-linux:
    name: 🐧 Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev libsodium-dev pkg-config

    - name: Install Qt 6.6.3
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

  # ============================================================================
  # JOB 2: WINDOWS (MSVC) - Qt 6.6.3 LTS
  # ============================================================================
  build-windows:
    name: 🪟 Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (VCPKG)
      run: |
        vcpkg install --triplet x64-windows
        echo "SODIUM_ROOT_ENV=${{ github.workspace }}/vcpkg_installed/x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Qt 6.6.3
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'windows'
        arch: 'win64_msvc2019_64'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release
      
  # ============================================================================
  # JOB 3: ANDROID (ARM64) - Qt 6.6.3 LTS
  # ============================================================================
  build-android:
    name: 🤖 Android (ARM64)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential tar curl zip unzip

    # 1. FIX: Added '--classic' to ignore vcpkg.json and force manual install
    - name: Install Libsodium (VCPKG)
      run: |
        # A. Bootstrap Vcpkg
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh

        # B. Install Libsodium (Use --classic to bypass Manifest Mode error)
        ./vcpkg/vcpkg install libsodium --triplet arm64-android --classic

        # C. Re-arrange files to match your CMakeLists.txt structure
        # Classic mode installs to: vcpkg/installed/arm64-android
        
        mkdir -p libs/arm64-v8a
        cp -r vcpkg/installed/arm64-android/include libs/arm64-v8a/
        mkdir -p libs/arm64-v8a/lib
        
        # Copy the static library
        cp vcpkg/installed/arm64-android/lib/libsodium.a libs/arm64-v8a/lib/
        
        # Set the ENV variable to the parent 'libs' folder
        echo "SODIUM_ANDROID_ROOT_ENV=${{ github.workspace }}/libs" >> $GITHUB_ENV

    # 2. INSTALL HOST QT (Linux Tools needed to build Android)
    - name: Install Qt Host
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'
        cache: true

    # 3. INSTALL TARGET QT (Android Libs)
    - name: Install Qt Target
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true
        
    # 3.5 NUCLEAR FIX: Delete the broken Android 36 SDK
    - name: Nuke Newer Android SDKs
      run: |
        echo "Deleting incompatible Android 35+ platform..."
        sudo rm -rf ${ANDROID_SDK_ROOT}/platforms/android-36*
        sudo rm -rf ${ANDROID_SDK_ROOT}/build-tools/36*
        
        sudo rm -rf ${ANDROID_SDK_ROOT}/platforms/android-35*
        sudo rm -rf ${ANDROID_SDK_ROOT}/build-tools/35*
        echo "Cleanup done. Build will now force to stable android 34."
    
    # 4. Configure CMake
    - name: Configure CMake
      run: |
        # Point to the 6.6.3 Host Tools
        export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.6.3/gcc_64
        
        qt-cmake -B build -DCMAKE_BUILD_TYPE=Release \
        -DQT_ANDROID_BUILD_ALL_ABIS=OFF \
        -DANDROID_ABI=arm64-v8a \
        -DANDROID_PLATFORM=android-28 \
        -DQT_ANDROID_COMPILE_SDK_VERSION=33 \
        -DQT_ANDROID_TARGET_SDK_VERSION=33 \
        -DQT_HOST_PATH=$QT_HOST_PATH

    # 5. Build the APK
    - name: Build APK
      run: cmake --build build --config Release

    # 6. UPLOAD ARTIFACT (Downloadable APK)
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Android
        path: build/**/*.apk  # The '**' finds the APK even if it's buried in subfolders
        if-no-files-found: error
        retention-days: 1     # Deletes after 24 hours to save storage
