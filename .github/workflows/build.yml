name: Build DCharVault

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.qml'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:
  # JOB 1: LINUX (Ubuntu) - Qt 6.8.2 LTS
  build-linux:
    name: 🐧 Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev libsodium-dev pkg-config

    - name: Install Qt 6.8.2
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'linux'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release


  # JOB 2: WINDOWS (MSVC) - Qt 6.8.2 LTS
  build-windows:
    name: 🪟 Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (VCPKG)
      run: |
        vcpkg install --triplet x64-windows
        echo "SODIUM_ROOT_ENV=${{ github.workspace }}/vcpkg_installed/x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Qt 6.8.2
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'windows'
        arch: 'win64_msvc2022_64'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release
      
  # JOB 3: ANDROID (ARM64) - Qt 6.8.2 LTS
  build-android:
    name: 🤖 Android (ARM64)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential tar curl zip unzip

    # 1. Install Libsodium
    - name: Install Libsodium (VCPKG)
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install libsodium --triplet arm64-android --classic
        
        mkdir -p libs/arm64-v8a
        cp -r vcpkg/installed/arm64-android/include libs/arm64-v8a/
        mkdir -p libs/arm64-v8a/lib
        cp vcpkg/installed/arm64-android/lib/libsodium.a libs/arm64-v8a/lib/
        echo "SODIUM_ANDROID_ROOT_ENV=${{ github.workspace }}/libs" >> $GITHUB_ENV

    # 2. INSTALL HOST QT
    - name: Install Qt Host
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'linux'
        target: 'desktop'
        cache: true

    # 3. INSTALL TARGET QT
    - name: Install Qt Target
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true
        

    # 3.5 Generate Android Keystore for Release Signing
    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.keystore -alias vaultkey -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Vault,O=Dev,C=US"
        echo "KEYSTORE_PATH=$PWD/release.keystore" >> $GITHUB_ENV

  # 4. Configure CMake (RELEASE MODE)
    - name: Configure CMake
      run: |
        export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.8.2/gcc_64 
        
        qt-cmake -B build -DCMAKE_BUILD_TYPE=Release \
        -DQT_ANDROID_BUILD_ALL_ABIS=OFF \
        -DANDROID_ABI=arm64-v8a \
        -DQT_HOST_PATH=$QT_HOST_PATH \
        -DQT_ANDROID_SIGN_APK=ON

    # 5. Build the APK (RELEASE MODE WITH SIGNING)
    - name: Build APK
      env:
        QT_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        QT_ANDROID_KEYSTORE_ALIAS: vaultkey
        QT_ANDROID_KEYSTORE_STORE_PASS: password123
        QT_ANDROID_KEYSTORE_KEY_PASS: password123
      run: cmake --build build --config Release

    # 6. UPLOAD ARTIFACT
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Android
        path: build/**/*.apk
        if-no-files-found: error
        retention-days: 1
