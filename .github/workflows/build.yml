name: Build DCharVault

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev libsodium-dev pkg-config

    - name: Install Qt 6.8
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        host: 'linux'
        modules: 'qt5compat qtshadertools qtquick3d'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

# ============================================================================
  # JOB 2: WINDOWS (MSVC)
  # ============================================================================
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    #Instead of downloading vcpkg, we use the one already on the server.
    - name: Install Libsodium
      run: |
        vcpkg install libsodium:x64-windows
        # We tell your CMakeLists where to find it using the system variable
        echo "SODIUM_ROOT_ENV=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Qt 6.8
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        host: 'windows'
        arch: 'win64_msvc2022_64'

    - name: Configure CMake
      # use the system-provided toolchain file
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release
